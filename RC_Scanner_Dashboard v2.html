<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Scanner v3.0 – Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0f1a; color:#eef5ff; font-family:'Inter',sans-serif; font-size:13px; overflow:hidden; }
.topbar { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#0c111c; border-bottom:1px solid #1e2a3a; }
.logo { font-weight:800; font-size:18px; background:linear-gradient(135deg,#00ff88,#00ccaa); -webkit-background-clip:text; background-clip:text; color:transparent; }
.logo span { color:#5a7a9a; font-weight:400; font-size:12px; }
.status { display:flex; gap:15px; align-items:center; font-size:12px; }
.dot { width:8px; height:8px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; animation:pulse 1.5s infinite; }
.dot.off { background:#ff4444; box-shadow:none; animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.layout { display:grid; grid-template-columns:280px 1fr 340px; height:calc(100vh - 52px); overflow:hidden; }
.sidebar { background:#0c111c; border-right:1px solid #1e2a3a; overflow-y:auto; padding:10px; }
.watchlist-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:6px; margin-bottom:4px; cursor:pointer; background:#111722; border:1px solid #1e2a3a; transition:0.1s; }
.watchlist-item:hover { background:#1a2535; border-color:#2a3a50; }
.watchlist-item.active { background:#1a2a3a; border-left:3px solid #00ff88; }
.symbol { font-weight:700; font-size:14px; }
.gain { font-size:12px; font-weight:600; }
.gain.pos { color:#00ff88; }
.gain.neg { color:#ff5555; }
.score { font-size:10px; background:#1e2a3a; padding:2px 6px; border-radius:10px; }
.main { display:flex; flex-direction:column; overflow:hidden; }
.chart-header { padding:10px 15px; background:#0c111c; border-bottom:1px solid #1e2a3a; display:flex; justify-content:space-between; align-items:center; }
.active-symbol { font-size:20px; font-weight:800; }
.active-price { font-size:18px; color:#00ff88; }
.tf-buttons { display:flex; gap:5px; }
.tf-btn { background:#111722; border:1px solid #1e2a3a; padding:4px 12px; border-radius:4px; cursor:pointer; font-size:11px; }
.tf-btn.active { background:#00ff8822; border-color:#00ff88; color:#00ff88; }
.chart-container { flex:1; min-height:0; }
.right-panel { background:#0c111c; border-left:1px solid #1e2a3a; display:flex; flex-direction:column; overflow-y:auto; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; border-bottom:1px solid #1e2a3a; }
.stat-card { background:#111722; padding:8px; border-radius:6px; text-align:center; }
.stat-label { font-size:10px; color:#8aa0bc; }
.stat-value { font-size:20px; font-weight:700; }
.news-item { padding:10px; border-bottom:1px solid #1e2a3a; }
.news-title { font-size:12px; font-weight:500; margin-bottom:4px; }
.news-source { font-size:10px; color:#8aa0bc; }
.alert-item { padding:10px; border-bottom:1px solid #1e2a3a; border-left:3px solid #00ff88; background:#111722; margin-bottom:6px; border-radius:4px; }
.alert-symbol { font-weight:700; font-size:13px; }
.alert-msg { font-size:11px; color:#b0c4e0; margin-top:4px; }
.add-ticker { display:flex; gap:6px; padding:10px; border-top:1px solid #1e2a3a; }
.add-ticker input { flex:1; background:#111722; border:1px solid #1e2a3a; padding:6px 10px; border-radius:4px; color:white; }
.add-ticker button { background:#1e2a3a; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; }
.empty { text-align:center; padding:30px; color:#5a7a9a; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">RC SCANNER <span>v3.0 • Ross Cameron Rules</span></div>
  <div class="status">
    <div><span class="dot" id="apiDot"></span> <span id="apiStatus">API Live</span></div>
    <div>🕒 <span id="clock"></span> UK</div>
  </div>
</div>
<div class="layout">
  <!-- SIDEBAR (Watchlist) -->
  <div class="sidebar">
    <div style="margin-bottom:12px; display:flex; justify-content:space-between;">
      <strong>📋 Scanner Hits</strong>
      <button onclick="fetchScanner(true)" style="background:#1e2a3a; border:none; padding:2px 8px; border-radius:4px; cursor:pointer;">↻ Refresh</button>
    </div>
    <div id="watchlistContainer"></div>
    <div class="add-ticker">
      <input type="text" id="manualTicker" placeholder="Add ticker (e.g. TSLA)" maxlength="10">
      <button onclick="addManualTicker()">+</button>
    </div>
  </div>

  <!-- MAIN (Chart) -->
  <div class="main">
    <div class="chart-header">
      <div><span class="active-symbol" id="activeSymbol">—</span> <span class="active-price" id="activePrice"></span></div>
      <div class="tf-buttons">
        <button class="tf-btn active" data-tf="1" onclick="setChartTF('1',this)">1m</button>
        <button class="tf-btn" data-tf="5" onclick="setChartTF('5',this)">5m</button>
        <button class="tf-btn" data-tf="15" onclick="setChartTF('15',this)">15m</button>
        <button class="tf-btn" data-tf="60" onclick="setChartTF('60',this)">1h</button>
        <button class="tf-btn" data-tf="D" onclick="setChartTF('D',this)">1D</button>
      </div>
    </div>
    <div class="chart-container" id="tvChart"></div>
  </div>

  <!-- RIGHT PANEL (News + Alerts) -->
  <div class="right-panel">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Today Alerts</div><div class="stat-value" id="alertCount">0</div></div>
      <div class="stat-card"><div class="stat-label">Scanner Hits</div><div class="stat-value" id="scanCount">0</div></div>
    </div>
    <div style="padding:0 12px; border-bottom:1px solid #1e2a3a; display:flex; gap:20px;">
      <span id="tabAlerts" style="cursor:pointer; padding:8px 0; font-weight:600; border-bottom:2px solid #00ff88;">📡 Alerts</span>
      <span id="tabNews" style="cursor:pointer; padding:8px 0; color:#8aa0bc;">📰 News</span>
    </div>
    <div id="alertsPanel" style="flex:1; overflow-y:auto; padding:8px;"></div>
    <div id="newsPanel" style="flex:1; overflow-y:auto; padding:8px; display:none;"></div>
  </div>
</div>

<script>
const API_BASE = 'https://rc-scanner-gjtm.onrender.com';
let scannerData = {};       // key: symbol -> full result
let watchlist = [];
let activeTicker = '';
let tvWidget = null;
let alertCount = 0;
let currentTF = '1';

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
}
setInterval(updateClock, 1000);
updateClock();

// Fetch scanner
async function fetchScanner(manual = false) {
  try {
    const res = await fetch(`${API_BASE}/api/scanner?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('scanCount').innerText = data.count || 0;
    document.getElementById('apiDot').className = 'dot';
    document.getElementById('apiStatus').innerText = `Live · ${data.count} hits`;
    
    // Build map
    scannerData = {};
    (data.scanner || []).forEach(s => { scannerData[s.symbol] = s; });
    
    // Update watchlist from API results + manual additions
    const apiSymbols = (data.scanner || []).map(s => s.symbol);
    const storedManual = JSON.parse(localStorage.getItem('rc_manual') || '[]');
    const allSymbols = [...new Set([...apiSymbols, ...storedManual])];
    watchlist = allSymbols.map(sym => ({
      symbol: sym,
      change: scannerData[sym]?.day_gain || 0,
      score: scannerData[sym]?.score || 0,
      hasData: !!scannerData[sym]
    }));
    renderWatchlist();
    
    if (manual && data.scanner?.length) {
      addAlert('SYSTEM', `Scanner found ${data.scanner.length} candidates`, 'info');
    }
    if (!activeTicker && watchlist.length) selectTicker(watchlist[0].symbol);
  } catch(err) {
    console.error(err);
    document.getElementById('apiDot').className = 'dot off';
    document.getElementById('apiStatus').innerText = 'API Error';
  }
}

function renderWatchlist() {
  const container = document.getElementById('watchlistContainer');
  if (!watchlist.length) {
    container.innerHTML = '<div class="empty">No scanner hits yet<br>Refresh during market hours</div>';
    return;
  }
  container.innerHTML = watchlist.map(t => `
    <div class="watchlist-item ${t.symbol === activeTicker ? 'active' : ''}" onclick="selectTicker('${t.symbol}')">
      <div><span class="symbol">${t.symbol}</span> ${t.score ? `<span class="score">${t.score.toFixed(0)}</span>` : ''}</div>
      <div class="gain ${t.change >= 0 ? 'pos' : 'neg'}">${t.change >= 0 ? '+' : ''}${t.change.toFixed(1)}%</div>
    </div>
  `).join('');
}

function selectTicker(symbol) {
  activeTicker = symbol;
  renderWatchlist();
  const data = scannerData[symbol];
  document.getElementById('activeSymbol').innerText = symbol;
  if (data) {
    document.getElementById('activePrice').innerHTML = `$${data.price?.toFixed(2)}  <span style="font-size:12px; color:#00ff88;">+${data.day_gain?.toFixed(1)}%</span>`;
  } else {
    document.getElementById('activePrice').innerHTML = '';
  }
  loadChart(symbol);
  loadNews(symbol);
}

function loadChart(symbol) {
  const container = document.getElementById('tvChart');
  container.innerHTML = '';
  if (typeof TradingView === 'undefined') {
    container.innerHTML = '<div class="empty">Loading TradingView...</div>';
    return;
  }
  try {
    tvWidget = new TradingView.widget({
      container_id: 'tvChart',
      symbol: symbol,
      interval: currentTF,
      timezone: 'Europe/London',
      theme: 'dark',
      style: '1',
      locale: 'en',
      toolbar_bg: '#0c111c',
      enable_publishing: false,
      hide_top_toolbar: false,
      studies: ['Volume@tv-basicstudies', 'VWAP@tv-basicstudies', 'MACD@tv-basicstudies'],
      width: '100%',
      height: '100%'
    });
  } catch(e) {
    container.innerHTML = `<div class="empty">Chart unavailable<br><a href="https://www.tradingview.com/chart/?symbol=${symbol}" target="_blank">Open in TradingView →</a></div>`;
  }
}

function setChartTF(tf, btn) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (activeTicker) loadChart(activeTicker);
}

async function loadNews(symbol) {
  const newsDiv = document.getElementById('newsPanel');
  newsDiv.innerHTML = '<div class="empty">Loading news...</div>';
  try {
    const res = await fetch(`${API_BASE}/api/news?symbol=${symbol}`);
    const data = await res.json();
    const news = data.news || [];
    if (!news.length) {
      newsDiv.innerHTML = '<div class="empty">No recent news found</div>';
      return;
    }
    newsDiv.innerHTML = news.map(n => `
      <div class="news-item">
        <div class="news-title">${n.title}</div>
        <div class="news-source">${n.source || 'News'} • ${n.published || ''}</div>
        ${n.url ? `<a href="${n.url}" target="_blank" style="font-size:10px; color:#00ff88;">Read more →</a>` : ''}
      </div>
    `).join('');
  } catch(e) {
    newsDiv.innerHTML = '<div class="empty">News fetch failed</div>';
  }
}

function addAlert(symbol, message, type = 'hit') {
  alertCount++;
  document.getElementById('alertCount').innerText = alertCount;
  const alertsDiv = document.getElementById('alertsPanel');
  const empty = alertsDiv.querySelector('.empty');
  if (empty) empty.remove();
  const alertEl = document.createElement('div');
  alertEl.className = 'alert-item';
  alertEl.innerHTML = `<div><span class="alert-symbol">${symbol}</span> <span style="font-size:10px;">${new Date().toLocaleTimeString()}</span></div><div class="alert-msg">${message}</div>`;
  alertsDiv.prepend(alertEl);
  if (alertsDiv.children.length > 30) alertsDiv.removeChild(alertsDiv.lastChild);
}

function addManualTicker() {
  const input = document.getElementById('manualTicker');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  if (watchlist.find(t => t.symbol === sym)) return;
  const manual = JSON.parse(localStorage.getItem('rc_manual') || '[]');
  if (!manual.includes(sym)) manual.push(sym);
  localStorage.setItem('rc_manual', JSON.stringify(manual));
  watchlist.push({ symbol: sym, change: 0, score: 0, hasData: false });
  renderWatchlist();
  selectTicker(sym);
  input.value = '';
  addAlert('MANUAL', `${sym} added to watchlist`, 'info');
}

// Tab switching
document.getElementById('tabAlerts').onclick = () => {
  document.getElementById('alertsPanel').style.display = 'block';
  document.getElementById('newsPanel').style.display = 'none';
  document.getElementById('tabAlerts').style.borderBottom = '2px solid #00ff88';
  document.getElementById('tabNews').style.borderBottom = 'none';
  document.getElementById('tabNews').style.color = '#8aa0bc';
  document.getElementById('tabAlerts').style.color = '#eef5ff';
};
document.getElementById('tabNews').onclick = () => {
  document.getElementById('alertsPanel').style.display = 'none';
  document.getElementById('newsPanel').style.display = 'block';
  document.getElementById('tabNews').style.borderBottom = '2px solid #00ff88';
  document.getElementById('tabAlerts').style.borderBottom = 'none';
  document.getElementById('tabAlerts').style.color = '#8aa0bc';
  document.getElementById('tabNews').style.color = '#eef5ff';
  if (activeTicker) loadNews(activeTicker);
};

// Initial fetch and refresh every 60 seconds
fetchScanner();
setInterval(() => fetchScanner(), 60000);
</script>
</body>
</html>
